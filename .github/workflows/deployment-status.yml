name: Deployment Status Workflow

on:
  push:
    branches: [ main ]

jobs:
  pre-deployment:
    name: pre-deployment
    runs-on: ubuntu-latest
    outputs:
      issue-number: ${{ steps.create-issue.outputs.issue-number }}
      previous-sha: ${{ steps.get-previous-sha.outputs.previous-sha }}
      current-sha: ${{ steps.get-current-sha.outputs.current-sha }}
      package-version: ${{ steps.get-package-version.outputs.package-version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # Get previous commit for rollback

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install dependencies
        run: npm ci

      - name: Run lint checks
        run: npm run lint || echo "Lint check failed - adjust workflow as needed for your project"

      - name: Run tests
        run: npm test || echo "Tests failed - adjust workflow as needed for your project"

      - name: Get previous commit SHA
        id: get-previous-sha
        run: echo "previous-sha=$(git rev-parse HEAD^)" >> $GITHUB_OUTPUT

      - name: Get current commit SHA
        id: get-current-sha
        run: echo "current-sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Get package version
        id: get-package-version
        run: echo "package-version=$(jq -r .version package.json)" >> $GITHUB_OUTPUT

      - name: Create deployment tracking issue
        id: create-issue
        uses: actions/github-script@v7
        with:
          script: |
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Deployment Tracking - ${{ steps.get-current-sha.outputs.current-sha }}`,
              body: `# Deployment Tracking for ${{ steps.get-current-sha.outputs.current-sha }}
              
              - Previous Commit: ${{ steps.get-previous-sha.outputs.previous-sha }}
              - Current Commit: ${{ steps.get-current-sha.outputs.current-sha }}
              - Package Version: ${{ steps.get-package-version.outputs.package-version }}
              
              Deployment in progress...`,
              labels: ['deployment', 'in-progress']
            });
            return issue.data.number;
          result-encoding: string

      - name: Post pre-deployment comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.create-issue.outputs.issue-number }},
              body: "Pre-deployment checks completed"
            });

  rollback-preparation:
    name: rollback-preparation
    runs-on: ubuntu-latest
    needs: pre-deployment
    outputs:
      artifact-name: ${{ steps.create-artifact.outputs.artifact-name }}
      checksum: ${{ steps.generate-checksum.outputs.checksum }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Create rollback script
        run: |
          cat > rollback.sh << 'EOF'
          #!/bin/bash
          set -euo pipefail

          echo "=== Starting Rollback Process ==="

          # Verify current commit
          CURRENT_COMMIT=$(git rev-parse HEAD)
          echo "Current commit: $CURRENT_COMMIT"

          # Rollback to previous commit
          echo "Rolling back to ${{ needs.pre-deployment.outputs.previous-sha }}"
          git checkout ${{ needs.pre-deployment.outputs.previous-sha }}

          # Reinstall dependencies
          echo "Reinstalling dependencies..."
          npm ci

          # Verify rollback
          echo "Verifying rollback..."
          git rev-parse HEAD
          echo "Rollback completed successfully!"
          EOF
          chmod +x rollback.sh

      - name: Create dependency verification script
        run: |
          cat > verify-dependencies.sh << 'EOF'
          #!/bin/bash
          set -euo pipefail

          echo "=== Verifying Dependencies ==="
          npm ls --depth=0
          echo "Dependency verification completed!"
          EOF
          chmod +x verify-dependencies.sh

      - name: Create rollback documentation
        run: |
          cat > ROLLBACK_GUIDE.md << 'EOF'
          # Rollback Guide for Deployment ${{ needs.pre-deployment.outputs.current-sha }}

          ## Prerequisites
          - Git installed
          - Node.js 20.x installed
          - Access to the repository

          ## Step-by-Step Rollback
          1. Download and extract the rollback package
          2. Navigate to the project directory
          3. Run the rollback script: `./rollback.sh`
          4. Verify the rollback with: `./verify-dependencies.sh`
          5. Confirm application is running correctly

          ## Emergency Rollback
          If the main script fails:
          ```bash
          git checkout ${{ needs.pre-deployment.outputs.previous-sha }}
          npm ci
          npm start
          ```
          EOF

      - name: Create rollback package
        id: create-artifact
        run: |
          ARTIFACT_NAME="rollback-package-${{ needs.pre-deployment.outputs.current-sha }}"
          mkdir -p $ARTIFACT_NAME
          cp rollback.sh $ARTIFACT_NAME/
          cp verify-dependencies.sh $ARTIFACT_NAME/
          cp ROLLBACK_GUIDE.md $ARTIFACT_NAME/
          cp package.json $ARTIFACT_NAME/
          cp package-lock.json $ARTIFACT_NAME/
          tar -czf $ARTIFACT_NAME.tar.gz $ARTIFACT_NAME/
          echo "artifact-name=$ARTIFACT_NAME.tar.gz" >> $GITHUB_OUTPUT

      - name: Generate SHA256 checksum
        id: generate-checksum
        run: |
          CHECKSUM=$(sha256sum ${{ steps.create-artifact.outputs.artifact-name }} | awk '{print $1}')
          echo "checksum=$CHECKSUM" >> $GITHUB_OUTPUT

      - name: Upload rollback artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.create-artifact.outputs.artifact-name }}
          path: ${{ steps.create-artifact.outputs.artifact-name }}
          retention-days: 30

      - name: Post rollback plan comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.pre-deployment.outputs.issue-number }},
              body: `# 🔄 Rollback Plan Ready

              - Previous Commit: ${{ needs.pre-deployment.outputs.previous-sha }}
              - Current Commit: ${{ needs.pre-deployment.outputs.current-sha }}
              - Package Version: ${{ needs.pre-deployment.outputs.package-version }}
              - Artifact: ${{ steps.create-artifact.outputs.artifact-name }}
              - SHA256: ${{ steps.generate-checksum.outputs.checksum }}

              ✅ Rollback script created
              ✅ Configuration backups (package.json, package-lock.json)
              ✅ Dependency verification script
              ✅ Detailed rollback documentation
              ✅ Compressed rollback package with checksum

              ## Quick Rollback Command
              \`\`\`bash
              # Download and extract the rollback artifact, then run:
              ./rollback.sh
              \`\`\`

              - Rollback script created: true
              - Configuration backup: true`
            });

  post-deployment:
    name: post-deployment
    runs-on: ubuntu-latest
    needs: rollback-preparation
    steps:
      - name: Update issue labels
        uses: actions/github-script@v7
        with:
          script: |
            // Remove in-progress label
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.pre-deployment.outputs.issue-number }},
              name: 'in-progress'
            });

            // Add completed label
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.pre-deployment.outputs.issue-number }},
              labels: ['completed']
            });

      - name: Post final deployment comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.pre-deployment.outputs.issue-number }},
              body: `# Deployment Completed Successfully

              Rollback artifact details:
              - Artifact: ${{ needs.rollback-preparation.outputs.artifact-name }}
              - SHA256: ${{ needs.rollback-preparation.outputs.checksum }}

              The deployment tracking issue will now be closed.`
            });

      - name: Close deployment issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.pre-deployment.outputs.issue-number }},
              state: 'closed'
            });
